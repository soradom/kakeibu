<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f2f5;color:#1a1a18;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* ── 로딩 ── */
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay{position:fixed;inset:0;background:rgba(241,242,245,.95);z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading-overlay.show{display:flex}
.loading-spinner{width:32px;height:32px;border:3px solid #e0e1e5;border-top-color:#4472c4;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:13px;color:#9297a1;font-weight:500}

/* ── PIN 잠금 화면 ── */
#pw-screen{position:fixed;inset:0;background:#1a1a18;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.pin-status-bar{height:44px;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.pin-status-time{font-size:13px;font-weight:600;color:#fff}
.pin-status-icons{display:flex;align-items:center;gap:6px}
.pin-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:0 30px;width:100%}
.pin-logo{width:56px;height:56px;border-radius:50%;background:#4472c4;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff}
.pin-title{font-size:17px;font-weight:700;color:#fff}
.pin-hint{font-size:13px;color:#9297a1}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .15s}
.pin-dot.filled{background:#fff}
.pin-keypad{width:100%;padding:0 40px 34px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px 0}
.pin-key{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.08);border:none;font-family:inherit;font-size:22px;font-weight:400;color:#fff;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;transition:background .15s}
.pin-key:hover{background:rgba(255,255,255,.16)}
.pin-key:active{background:rgba(255,255,255,.22)}
.pin-key.empty{background:transparent;pointer-events:none}
.pin-key.del{font-size:18px}
.pin-error{font-size:13px;color:#ff6b6b;min-height:20px;text-align:center}

/* ── 헤더 ── */
.header{background:#f1f2f5;padding:16px 20px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header-title{font-size:22px;font-weight:800;color:#1a1a18;letter-spacing:-0.3px}
.header-right{display:flex;align-items:center;gap:8px}
.search-chip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e0e1e5;border-radius:20px;padding:7px 13px;font-size:13px;color:#9297a1;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.search-chip:hover{border-color:#4472c4;color:#4472c4}
.search-chip svg{width:14px;height:14px}

/* ── 하단 탭바 ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e9ec;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;border:none;background:none;font-family:inherit;cursor:pointer;color:#9297a1;transition:color .15s;position:relative}
.tab-btn.active{color:#4472c4}
.tab-btn.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#4472c4;border-radius:0 0 2px 2px}
.tab-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.tab-label{font-size:10px;font-weight:500}

/* ── 패널 ── */
.panel{display:none;padding:0 0 calc(68px + env(safe-area-inset-bottom))}
.panel.active{display:block}
.panel-body{padding:0 20px}

/* ── 입력탭 잔액 카드 ── */
.balance-card{background:#1a1a18;border-radius:16px;padding:20px;margin:0 20px 16px;color:#fff;position:relative;overflow:hidden}
.balance-card::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(68,114,196,.2);top:-40px;right:-30px}
.bc-label{font-size:12px;color:rgba(255,255,255,.5);font-weight:500;margin-bottom:8px}
.bc-val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.bc-sub{font-size:12px;color:rgba(255,255,255,.4)}

/* ── 세그먼트 ── */
.seg-wrap{background:#fff;border-radius:14px;padding:4px;display:grid;grid-template-columns:1fr 1fr;gap:0;margin:0 20px 16px}
.seg-btn{padding:11px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;color:#9297a1;border-radius:10px;cursor:pointer;transition:all .2s}
.seg-btn.active-expense{background:#fff3f3;color:#e05c5c;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.seg-btn.active-income{background:#f0f7ff;color:#4472c4;box-shadow:0 1px 6px rgba(0,0,0,.08)}

/* ── 입력 폼 카드 ── */
.form-section{background:#fff;border-radius:16px;padding:20px;margin:0 20px 16px}
.form-row{margin-bottom:16px}
.form-row:last-child{margin-bottom:0}
.form-row label{display:block;font-size:12px;font-weight:600;color:#9297a1;margin-bottom:8px}
.form-row input,.form-row select{width:100%;font-family:inherit;font-size:15px;color:#1a1a18;background:#f5f6f8;border:none;border-radius:12px;padding:13px 14px;outline:none;transition:background .15s}
.form-row input:focus,.form-row select:focus{background:#eef0f4}
.amount-wrap{position:relative}
.amount-wrap input{padding-right:28px}
.amount-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:#9297a1;font-weight:500;pointer-events:none}
.pay-chips{display:flex;gap:8px}
.pay-chip{padding:8px 18px;border:1.5px solid #e0e1e5;border-radius:20px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#9297a1;transition:all .2s}
.pay-chip.active{border-color:#4472c4;background:#f0f4fc;color:#4472c4}
.save-btn{width:100%;padding:15px;background:#4472c4;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:4px}
.save-btn:hover{opacity:.9}
.save-btn:active{transform:scale(.98)}

/* ── 월 네비게이터 ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:13px 16px;margin:0 20px 14px}
.month-nav-btn{background:none;border:none;cursor:pointer;color:#9297a1;font-size:16px;padding:4px 8px;border-radius:8px;transition:background .15s;font-family:inherit}
.month-nav-btn:hover{background:#f1f2f5}
.month-nav-label{font-size:15px;font-weight:700;color:#1a1a18}
.month-nav select{font-family:inherit;font-size:15px;font-weight:700;color:#1a1a18;background:none;border:none;outline:none;cursor:pointer;text-align:center}

/* ── 요약 탭 잔액 카드 ── */
.summary-hero{background:#1a1a18;border-radius:16px;padding:22px;margin:0 20px 14px;color:#fff;position:relative;overflow:hidden}
.summary-hero::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(68,114,196,.2);top:-40px;right:-30px}
.sh-label{font-size:12px;color:rgba(255,255,255,.5);font-weight:500;margin-bottom:8px}
.sh-val{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:16px}
.sh-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin-bottom:16px}
.sh-row{display:flex;justify-content:space-between}
.sh-item-label{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:4px}
.sh-item-val{font-size:16px;font-weight:700}
.sh-item-val.income{color:#5ba4f5}
.sh-item-val.expense{color:#f57c7c}

/* ── 요약 그리드 ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 20px 14px}
.summary-card{background:#fff;border-radius:14px;padding:16px}
.sc-label{font-size:12px;color:#9297a1;font-weight:500;margin-bottom:6px}
.sc-val{font-size:17px;font-weight:700;color:#1a1a18}

/* ── 카테고리 바 ── */
.category-card{background:#fff;border-radius:14px;padding:18px 20px;margin:0 20px 14px}
.cat-title{font-size:14px;font-weight:700;color:#1a1a18;margin-bottom:14px}
.cat-item{margin-bottom:14px}
.cat-item:last-child{margin-bottom:0}
.cat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-name{font-size:13px;font-weight:500;color:#1a1a18}
.cat-amt{font-size:13px;font-weight:600;color:#1a1a18}
.cat-bar-bg{height:4px;background:#f1f2f5;border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.usable-card{background:#fff;border-radius:14px;padding:16px 20px;margin:0 20px 14px;border-left:3px solid #4472c4}
.uc-label{font-size:12px;color:#9297a1;font-weight:500;margin-bottom:6px}
.uc-val{font-size:20px;font-weight:700;color:#4472c4}
.uc-val.danger{color:#e05c5c}
.uc-sub{font-size:12px;color:#9297a1;margin-top:4px}

/* ── 거래 내역 리스트 ── */
.tx-date-label{font-size:12px;font-weight:600;color:#9297a1;padding:10px 20px 6px;letter-spacing:.2px}
.tx-card{background:#fff;border-radius:14px;margin:0 20px 10px;overflow:hidden}
.tx-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f5f6f8;cursor:default}
.tx-item:last-child{border-bottom:none}
.tx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tx-dot.income-t{background:#4472c4}
.tx-dot.card-t{background:#8e7ce6}
.tx-dot.cash-t{background:#e0a050}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:#9297a1;margin-top:2px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-size:14px;font-weight:700}
.tx-amount.pos{color:#4472c4}
.tx-amount.neg{color:#e05c5c}
.tx-balance{font-size:11px;color:#9297a1;margin-top:2px}
.tx-actions{display:flex;gap:2px;flex-shrink:0}
.tx-del-btn,.tx-edit-btn{background:none;border:none;color:#c8cad0;font-size:15px;cursor:pointer;padding:4px;border-radius:6px}
.tx-del-btn:hover{color:#e05c5c;background:#fff3f3}
.tx-edit-btn:hover{color:#4472c4;background:#f0f4fc}

/* ── 카드 결제 탭 ── */
.card-hero{background:#1a1a18;border-radius:16px;padding:20px;margin:0 20px 14px;color:#fff;position:relative;overflow:hidden}
.card-hero::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(68,114,196,.2);top:-40px;right:-30px}
.card-hero-meta{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.card-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.card-status.done{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.card-status.today{background:#e05c5c;color:#fff}
.card-status.upcoming{background:#4caf7d;color:#fff}
.card-hero-val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.card-hero-sub{font-size:12px;color:rgba(255,255,255,.4)}
.card-date-label{font-size:12px;font-weight:600;color:#9297a1;padding:10px 20px 6px}
.card-item-card{background:#fff;border-radius:14px;margin:0 20px 2px;overflow:hidden}
.card-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f5f6f8}
.card-item:last-child{border-bottom:none}
.card-item-dot{width:10px;height:10px;border-radius:50%;background:#8e7ce6;flex-shrink:0}
.card-item-info{flex:1;min-width:0}
.card-item-name{font-size:14px;font-weight:600;color:#1a1a18}
.card-item-amount{font-size:14px;font-weight:700;color:#e05c5c;flex-shrink:0}

/* ── 반복 설정 탭 ── */
.recur-info{background:#eef3fb;border-radius:14px;padding:14px 16px;margin:0 20px 14px;font-size:13px;color:#4472c4;line-height:1.6}
.recur-add-btn{width:calc(100% - 40px);margin:0 20px 14px;padding:14px;background:#fff;border:1.5px dashed #c8cad0;border-radius:14px;font-family:inherit;font-size:14px;color:#9297a1;cursor:pointer;font-weight:600;transition:all .2s}
.recur-add-btn:hover{border-color:#4472c4;color:#4472c4;background:#f0f4fc}
.recur-count{font-size:13px;color:#9297a1;padding:0 20px 8px}
.recur-count b{color:#1a1a18}
.recur-card{background:#fff;border-radius:14px;margin:0 20px 10px;overflow:hidden}
.recur-item{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #f5f6f8;background:#fff;user-select:none;-webkit-user-select:none}
.recur-item:last-child{border-bottom:none}
.recur-item.dragging{box-shadow:0 8px 24px rgba(0,0,0,.18);border-radius:14px;border-bottom:none}
.recur-placeholder{margin:6px 10px;border:2px dashed #c8cad0;border-radius:10px;background:#f5f6f8}
.recur-drag{color:#c8cad0;font-size:20px;cursor:grab;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-drag:none;-webkit-touch-callout:none;padding:10px 8px;margin:-10px -8px -10px -16px;display:flex;align-items:center}
.recur-drag:active{cursor:grabbing}
.recur-num{width:16px;flex-shrink:0;text-align:center;font-size:11px;font-weight:700;color:#c8cad0}
.recur-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.recur-icon.income{background:#eef3fb}
.recur-icon.expense{background:#f5f6f8}
.recur-body{flex:1;min-width:0}
.recur-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:3px}
.recur-name{font-size:14px;font-weight:600;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recur-amt{font-size:14px;font-weight:700;flex-shrink:0}
.recur-amt.income{color:#4472c4}
.recur-amt.expense{color:#e05c5c}
.recur-bottom{display:flex;align-items:center;gap:6px}
.recur-meta{font-size:12px;color:#9297a1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recur-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px}
.recur-badge.on{background:#eef3fb;color:#4472c4}
.recur-badge.off{background:#f5f6f8;color:#9297a1}
.recur-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.recur-toggle{position:relative;width:34px;height:19px;flex-shrink:0}
.recur-toggle input{opacity:0;width:0;height:0;position:absolute}
.recur-toggle .slider{position:absolute;inset:0;background:#c8cad0;border-radius:19px;cursor:pointer;transition:.2s}
.recur-toggle .slider:before{content:'';position:absolute;width:13px;height:13px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.recur-toggle input:checked+.slider{background:#4472c4}
.recur-toggle input:checked+.slider:before{transform:translateX(15px)}
.recur-edit-btn,.recur-del-btn{background:none;border:none;color:#c8cad0;font-size:14px;cursor:pointer;padding:4px;border-radius:6px}
.recur-edit-btn:hover{color:#4472c4;background:#f0f4fc}
.recur-del-btn:hover{color:#e05c5c;background:#fff3f3}

/* ── 모달 ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-backdrop.hidden{display:none}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:8px 20px 24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;background:#e0e1e5;border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:700;color:#1a1a18}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#9297a1;line-height:1;padding:4px}
.modal .form-row{margin-bottom:16px}
.modal .form-row label{display:block;font-size:12px;font-weight:600;color:#9297a1;margin-bottom:8px}
.modal .form-row input,.modal .form-row select{width:100%;font-family:inherit;font-size:15px;color:#1a1a18;background:#f5f6f8;border:none;border-radius:12px;padding:13px 14px;outline:none}
.modal .form-row input:focus{background:#eef0f4}
.modal .seg-wrap{margin:0 0 16px;background:#f5f6f8}
.modal .pay-chips{display:flex;gap:8px}
.modal .pay-chip{padding:8px 18px;border:1.5px solid #e0e1e5;border-radius:20px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#9297a1;transition:all .2s}
.modal .pay-chip.active{border-color:#4472c4;background:#f0f4fc;color:#4472c4}
.modal .save-btn{width:100%;padding:15px;background:#4472c4;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.modal .hint{font-size:11px;color:#9297a1;margin-top:6px}
.modal .rm-card-date-row{display:none}

/* ── 검색 모달 ── */
.search-input-wrap{margin-bottom:14px}
.search-input-wrap input{width:100%;font-family:inherit;font-size:15px;color:#1a1a18;background:#f5f6f8;border:none;border-radius:12px;padding:13px 14px;outline:none}
.search-summary{font-size:12px;font-weight:600;color:#9297a1;margin:12px 0 8px}
.search-hit{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid #f5f6f8;cursor:pointer}
.search-hit:last-child{border-bottom:none}
.search-hit:hover{background:#f8f9fa;border-radius:10px}
.search-hit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.search-hit-info{flex:1;min-width:0}
.search-hit-name{font-size:14px;font-weight:600;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-hit-meta{font-size:12px;color:#9297a1;margin-top:2px}
.search-hit-amount{font-size:14px;font-weight:700;flex-shrink:0}
.search-more-btn{width:100%;margin-top:10px;padding:10px;background:#f5f6f8;border:none;border-radius:12px;font-family:inherit;font-size:13px;color:#9297a1;cursor:pointer}
.search-more-btn:hover{background:#eef0f4}

/* ── 공통 ── */
.empty{padding:40px;text-align:center;color:#9297a1;font-size:14px;background:#fff;border-radius:14px;margin:0 20px}
.section-title{font-size:12px;font-weight:600;color:#9297a1;padding:10px 20px 6px;text-transform:uppercase;letter-spacing:.3px}
.toast{position:fixed;bottom:calc(68px + 16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a18;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes row-flash{0%{background:#fff9e6}70%{background:#fff9e6}100%{background:transparent}}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<!-- PIN 잠금 화면 -->

/* ── 비밀번호 인증 ── */
const PW_SESSION_KEY = 'kakeibo_auth';

// data: URL 등 sessionStorage가 차단된 환경에서도 앱이 죽지 않도록 메모리 폴백 사용
let _memoryAuthPw = null;
function getAuthPw(){
  try{ return sessionStorage.getItem(PW_SESSION_KEY); }catch(e){ return _memoryAuthPw; }
}
function setAuthPw(pw){
  _memoryAuthPw = pw;
  try{ sessionStorage.setItem(PW_SESSION_KEY, pw); }catch(e){ /* storage 차단 환경: 메모리로만 유지 */ }
}

/* ── PIN 키패드 ── */
let pinBuffer = '';

function pinPress(key){
  if(pinBuffer.length >= 4) return;
  pinBuffer += key;
  updatePinDots();
  if(pinBuffer.length === 4) setTimeout(submitPin, 150);
}

function pinDel(){
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('dot-'+i);
    if(d) d.classList.toggle('filled', i < pinBuffer.length);
  }
}

async function submitPin(){
  const errEl = document.getElementById('pw-error');
  const hintEl = document.getElementById('pw-hint');
  if(hintEl) hintEl.textContent = '확인 중...';
  try{
    const res = await fetch(API_URL + '?action=login&pw=' + encodeURIComponent(pinBuffer) + '&_=' + Date.now());
    const data = await res.json();
    if(data.success){
      setAuthPw(pinBuffer);
      document.getElementById('pw-screen').style.display = 'none';
      init();
    } else {
      errEl.textContent = '비밀번호가 틀렸습니다';
      if(hintEl) hintEl.textContent = 'PIN 4자리를 입력해주세요';
      pinBuffer = '';
      updatePinDots();
      setTimeout(()=>errEl.textContent='', 2000);
    }
  }catch(e){
    errEl.textContent = '서버 연결 오류';
    pinBuffer = '';
    updatePinDots();
  }
}

async function checkPassword(){ await submitPin(); }

/* ── API 통신 ── */
async function apiGet(action){
  const pw = getAuthPw() || '';
  const res = await fetch(API_URL + '?action=' + action + '&pw=' + encodeURIComponent(pw) + '&_=' + Date.now());
  if(!res.ok) throw new Error('API 오류: ' + res.status);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

async function apiPost(action, body){
  const pw = getAuthPw() || '';
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({action, pw, ...body})
  });
  if(!res.ok) throw new Error('API 오류: ' + res.status);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

/* ── 데이터 로드 (앱 시작 시) ── */
async function loadAll() {
  showLoading(true);
  try {
    const [apiRows, apiRecur] = await Promise.all([
      apiGet('getRows'),
      apiGet('getRecur')
    ]);
    rows = apiRows || [];
    recurRules = apiRecur || [];

    // 구글시트가 비어있으면 SEED 데이터 자동 투입
    if (rows.length === 0) {
      showToast('⏳ 초기 데이터를 구글시트에 저장 중...');
      const seedRows = SEED.filter(r => r.date < '2026-07-01')
        .map((r, i) => ({...r, id:'s'+i, balance:0}));
      const seedRecur = RECUR_SEED.map(r => ({...r}));
      await apiPost('initData', { rows: seedRows, rules: seedRecur });
      rows = seedRows;
      recurRules = seedRecur;
      showToast('✓ 초기 데이터 저장 완료!');
    }
  } catch(e) {
    showToast('⚠️ 데이터 불러오기 실패: ' + e.message);
    rows = [];
    recurRules = [];
  }
  applyRecurring();
  recalcBalances();
  showLoading(false);
}

/* ── 반복 거래 자동 생성 ── */
function ymd(y,m,d){ return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function ym(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function addOneMonth(ym_str){
  const [y,m]=ym_str.split('-').map(Number);
  return m===12 ? ym(y+1,1) : ym(y,m+1);
}
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }

function applyRecurring(){
  const today = new Date().toISOString().slice(0,10);
  const todayYM = today.slice(0,7);
  // 카드 결제 탭 표시를 위해 6개월 앞까지 행을 생성하되,
  // 오늘 이후 행에는 is_future=true 플래그를 달아 잔액 계산에서 제외
  let futureYM = todayYM;
  for(let i=0;i<6;i++) futureYM = addOneMonth(futureYM);

  recurRules.filter(r=>r.enabled).forEach(rule=>{
    let cursor = rule.start;
    const endYM = rule.end && rule.end < futureYM ? rule.end : futureYM;

    while(cursor <= endYM){
      const [cy, cm] = cursor.split('-').map(Number);
      const maxDay = daysInMonth(cy, cm);
      const day = Math.min(rule.day, maxDay);
      const txDate = ymd(cy, cm, day);

      // recurId 기준 또는 같은 날짜+내역 기준으로 중복 체크 (시드 데이터와 충돌 방지)
      const exists = rows.some(r =>
        (r.recurId === rule.id && r.date === txDate) ||
        (r.date === txDate && r.desc === rule.desc && r.category === rule.category)
      );
      if(!exists){
        let cardDate = '';
        if(!rule.is_cash && rule.card_day){
          const nextMo = addOneMonth(cursor);
          cardDate = nextMo + '-' + String(rule.card_day).padStart(2,'0');
        }
        rows.push({
          id: rule.id+'_'+txDate,
          recurId: rule.id,
          date: txDate,
          category: rule.category,
          desc: rule.desc,
          amount: rule.amount,
          balance: 0,
          card_date: cardDate,
          is_cash: rule.is_cash,
          is_future: txDate > today  // 오늘 이후는 미래 예정 행
        });
      }
      cursor = addOneMonth(cursor);
    }
  });
}

/* ── Balance ── */
function recalcBalances(){
  rows.sort((a,b)=>a.date.localeCompare(b.date)||(a._seq||0)-(b._seq||0));
  let bal = INITIAL_BALANCE;
  rows.forEach(r=>{
    if(r.is_future){ r.balance = null; return; }  // 미래 예정 행은 잔액 계산 제외
    bal += r.category==='수입'?r.amount:-r.amount;
    r.balance = bal;
  });
}
function getCurrentBalance(){
  // is_future가 아닌 행 중 마지막 잔액
  const real = rows.filter(r=>!r.is_future);
  return real.length ? real[real.length-1].balance : INITIAL_BALANCE;
}

/* ── Helpers ── */
const fmt = v=>'₩'+v.toLocaleString('ko-KR');
function addMonth(ym_str){ const[y,m]=ym_str.split('-').map(Number); return m===12?(y+1)+'-01':y+'-'+String(m+1).padStart(2,'0'); }
function getMonths(){ return[...new Set(rows.filter(r=>!r.is_future).map(r=>r.date.slice(0,7)))].sort(); }
function getMonthRows(ym){ return rows.filter(r=>r.date.startsWith(ym) && !r.is_future); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

/* ── Tabs ── */
function showTab(name){
  const names=['input','summary','history','card','recurring'];
  const titles={'input':'거래 입력','summary':'이달 요약','history':'거래 내역','card':'카드 결제','recurring':'반복 관리'};
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',names[i]===name));
  names.forEach(n=>{ const tb=document.getElementById('tabbar-'+n); if(tb) tb.classList.toggle('active',n===name); });
  const ht=document.getElementById('header-title'); if(ht) ht.textContent=titles[name]||'가계부';
  if(name==='summary') renderSummary();
  if(name==='card'){ populateCardSelect(); renderCard(); }
  if(name==='history') renderHistory();
  if(name==='recurring') renderRecurring();
}

async function addTransaction(){
  const date=document.getElementById('input-date').value;
  const desc=document.getElementById('input-desc').value.trim();
  const amount=getRawAmount('input-amount');
  let cardDate=document.getElementById('input-card-date').value;
  if(!date){showToast('날짜를 입력해주세요');return;}
  if(!desc){showToast('내역을 입력해주세요');return;}
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  const isCash=currentType==='expense'&&currentPayment==='cash';
  const isIncome=currentType==='income';
  if(!isCash&&!isIncome&&!cardDate) cardDate=addMonth(date.slice(0,7))+'-05';
  const newRow={
    id:Date.now().toString(36), _seq:rows.length, date,
    category:isIncome?'수입':'지출',
    desc:isCash?'(현금)'+desc:desc,
    amount, balance:0, card_date:cardDate||'', is_cash:isCash
  };
  try{
    await apiPost('addRow', newRow);
    rows.push(newRow);
    recalcBalances();
    populateCardSelect(); updateHeaderBalance(); updateInputBalance();
    document.getElementById('input-desc').value='';
    document.getElementById('input-amount').value=''; document.getElementById('input-amount').dataset.raw='';
    document.getElementById('input-card-date').value='';
    showToast('✓ 거래가 추가되었습니다');
  }catch(e){ showToast('⚠️ 저장 실패: '+e.message); }
}

/* ── Ledger Table ── */
function ledgerTable(data, showDelete=false, showCardDate=false){
  if(!data.length) return '<div class="empty">내역이 없습니다</div>';
  const totalExp=data.filter(r=>r.category==='지출').reduce((s,r)=>s+r.amount,0);
  const totalInc=data.filter(r=>r.category==='수입').reduce((s,r)=>s+r.amount,0);
  const lastBal=data[data.length-1]?.balance??0;
  const cdCol=showCardDate?'<th>카드결제일</th>':'';
  const cdFoot=showCardDate?'<td></td>':'';
  const delHead=showDelete?'<th style="width:56px"></th>':'';
  const delFoot=showDelete?'<td></td>':'';
  const body=data.map(r=>{
    const isInc=r.category==='수입';
    const ri=r.recurId?'🔁 ':'';
    const cd=showCardDate?`<td style="font-size:11px;color:#888781;text-align:center;white-space:nowrap">${r.card_date||'-'}</td>`:'';
    const del=showDelete?`<td class="col-action"><button class="edit-btn" data-tid="${r.id}" title="수정">✎</button><button class="del-btn" data-id="${r.id}" title="삭제">×</button></td>`:'';
    const dateStr=r.date?r.date.slice(5).replace('-','/'):'';
    return `<tr data-id="${r.id}">
      <td style="text-align:center;font-size:11px;color:#888781;white-space:nowrap">${dateStr}</td>
      <td class="col-type"><span class="type-pill ${isInc?'income':'expense'}">${r.category}</span></td>
      <td class="col-desc">${ri}${r.desc}</td>
      <td class="col-amount ${isInc?'income':''}">${isInc?'+':'-'}${fmt(r.amount)}</td>
      <td class="col-balance">${r.balance!=null?fmt(r.balance):"-"}</td>
      ${cd}${del}</tr>`;
  }).join('');
  return `<div class="ledger-wrap"><table class="ledger">
    <thead><tr><th>날짜</th><th>구분</th><th>내역</th><th>금액</th><th>잔액</th>${cdCol}${delHead}</tr></thead>
    <tbody>${body}</tbody>
    <tfoot><tr class="tfoot-row">
      <td colspan="3" style="text-align:right">합계</td>
      <td class="col-amount">-${fmt(totalExp)}${totalInc>0?' / +'+fmt(totalInc):''}</td>
      <td></td>
      ${cdFoot}${delFoot}
    </tr></tfoot>
  </table></div>`;
}

/* ── Summary ── */
function renderSummary(){
  makeMonthNav('summary-month-nav','summary-month',renderSummary);
  const ym_=document.getElementById('summary-month').value; if(!ym_)return;
  const mr=getMonthRows(ym_);
  const income=mr.filter(r=>r.category==='수입').reduce((s,r)=>s+r.amount,0);
  const totalExp=mr.filter(r=>r.category==='지출').reduce((s,r)=>s+r.amount,0);
  const cashExp=mr.filter(r=>r.category==='지출'&&r.is_cash).reduce((s,r)=>s+r.amount,0);
  const cardExp=totalExp-cashExp;
  const sorted=[...mr].filter(r=>!r.is_future).sort((a,b)=>b.date.localeCompare(a.date));
  const curBal=sorted[sorted.length-1]?.balance??getCurrentBalance();
  const nextMo=addMonth(ym_);
  const nextCardDue=rows.filter(r=>r.card_date===nextMo+'-05').reduce((s,r)=>s+r.amount,0);
  const usable=curBal-nextCardDue;
  const thisCardDue=rows.filter(r=>r.card_date===ym_+'-05').reduce((s,r)=>s+r.amount,0);
  const pct=income>0?Math.min(totalExp/income*100,100):0;
  const over=income>0&&totalExp>income;
  const sh_income = income>0?fmt(income):'-';
  const sh_expense = fmt(totalExp);
  let html=`<div class="summary-hero">
    <div class="sh-label">이번 달 잔액</div>
    <div class="sh-val">${fmt(curBal)}</div>
    <hr class="sh-divider">
    <div class="sh-row">
      <div><div class="sh-item-label">수입</div><div class="sh-item-val income">${sh_income}</div></div>
      <div style="text-align:right"><div class="sh-item-label">지출</div><div class="sh-item-val expense">-${sh_expense}</div></div>
    </div>
  </div>
  <div class="summary-grid">
    <div class="summary-card"><div class="sc-label">수입</div><div class="sc-val income">${income>0?fmt(income):'-'}</div></div>
    <div class="summary-card"><div class="sc-label">지출 합계</div><div class="sc-val expense">${fmt(totalExp)}</div></div>
    <div class="summary-card"><div class="sc-label">카드 사용</div><div class="sc-val card-c">${fmt(cardExp)}</div></div>
    <div class="summary-card"><div class="sc-label">현금 사용</div><div class="sc-val cash-c">${fmt(cashExp)}</div></div>
  </div>`;
  if(income>0) html+=`<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:4px">
      <span>수입 대비 지출</span><span style="font-weight:700;color:${over?'#c03030':'#0d8a56'}">${Math.round(totalExp/income*100)}%</span>
    </div>
    <div style="background:#e8e7e2;border-radius:4px;height:8px;overflow:hidden">
      <div style="height:100%;border-radius:4px;background:${over?'#c03030':'#0d8a56'};width:${pct}%"></div>
    </div></div>`;
  html+=`<div class="usable-card">
    <div class="uc-label">💰 사용 가능 잔액</div>
    <div class="uc-val" style="color:${usable<0?'#ff6b6b':'#fff'}">${fmt(usable)}</div>
    <div class="uc-sub">이달 잔액 ${fmt(curBal)} − 다음달 카드결제 ${fmt(nextCardDue)}</div>
  </div>`;
  if(thisCardDue>0) html+=`<div class="summary-card" style="margin-bottom:14px">
    <div class="sc-label">이달 5일 카드 결제 (전월 사용분)</div>
    <div class="sc-val expense" style="font-size:16px">${fmt(thisCardDue)}</div>
  </div>`;
  if(sorted.length){
    const sum_groups={};
    sorted.forEach(r=>{ if(!sum_groups[r.date]) sum_groups[r.date]=[]; sum_groups[r.date].push(r); });
    const days2=['일','월','화','수','목','금','토'];
    Object.keys(sum_groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
      const [sy,sm,sd]=date.split('-');
      const dow2=days2[new Date(date).getDay()];
      html+=`<div class="tx-date-label">${parseInt(sm)}월 ${parseInt(sd)}일 (${dow2})</div><div class="tx-card">`;
      sum_groups[date].forEach(r=>{
        const isInc=r.category==='수입';
        html+=`<div class="tx-item">
          <div class="tx-dot ${isInc?'income-t':(r.is_cash?'cash-t':'card-t')}"></div>
          <div class="tx-info"><div class="tx-name">${r.recurId?'🔁 ':''}${r.desc}</div><div class="tx-meta">${isInc?'수입':(r.is_cash?'현금':'카드')}</div></div>
          <div class="tx-right"><div class="tx-amount ${isInc?'pos':'neg'}">${isInc?'+':'-'}${fmt(r.amount)}</div></div>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('summary-content').innerHTML=html;
}

/* ── Card ── */
function populateCardSelect(){
  const el=document.getElementById('card-month'); if(!el) return;
  const prev=el.value;
  const cardMonths=[...new Set(rows.filter(r=>r.card_date&&r.category==='지출').map(r=>r.card_date.slice(0,7)))].sort();
  el.innerHTML='';
  cardMonths.forEach(m=>{ const o=document.createElement('option'); o.value=m;
    const[y,mo]=m.split('-'); o.textContent=y+'년 '+parseInt(mo)+'월 5일 결제'; el.appendChild(o); });
  const today=new Date().toISOString().slice(0,7);
  const def=cardMonths.find(m=>m>=today)||cardMonths[cardMonths.length-1]||'';
  el.value=cardMonths.includes(prev)?prev:def;
}

function renderCard(){
  const ym_=document.getElementById('card-month')?.value; if(!ym_)return;
  const today=new Date().toISOString().slice(0,10);
  const [y,mo]=ym_.split('-');
  const cpd=ym_+'-05';
  const items=rows.filter(r=>r.card_date===cpd&&r.category==='지출');
  const total=items.reduce((s,r)=>s+r.amount,0);
  const isPast=cpd<today, isToday=cpd===today;
  const statusCls=isPast?'done':isToday?'today':'upcoming';
  const statusTxt=isPast?'결제 완료':isToday?'오늘 결제':'결제 예정';
  let html=`<div class="card-hero">
    <div class="card-hero-meta">${y}년 ${parseInt(mo)}월 5일 카드 결제 <span class="card-status ${statusCls}">${statusTxt}</span></div>
    <div class="card-hero-val">${fmt(total)}</div>
    <div class="card-hero-sub">총 ${items.length}건 합산</div>
  </div>`;
  if(items.length){
    const cg={};
    items.forEach(r=>{ if(!cg[r.date]) cg[r.date]=[]; cg[r.date].push(r); });
    Object.keys(cg).sort().forEach(date=>{
      const[cy,cm,cd]=date.split('-');
      html+=`<div class="card-date-label">${parseInt(cm)}월 ${parseInt(cd)}일</div><div class="card-item-card">`;
      cg[date].forEach(r=>{ html+=`<div class="card-item">
        <div class="card-item-dot"></div>
        <div class="card-item-info"><div class="card-item-name">${r.recurId?'🔁 ':''}${r.desc}</div></div>
        <div class="card-item-amount">${fmt(r.amount)}</div>
      </div>`; });
      html+='</div>';
    });
  } else { html+=`<div class="empty">해당 월에 카드 결제 예정 내역이 없습니다</div>`; }
  document.getElementById('card-content').innerHTML=html;
}

/* ── History ── */
async function deleteRow(id){
  try{
    await apiPost('deleteRow', {id});
    rows=rows.filter(r=>r.id!==id);
    recalcBalances();
    populateCardSelect(); updateHeaderBalance(); updateInputBalance(); renderHistory();
    showToast('삭제되었습니다');
  }catch(e){
    showToast('⚠️ 삭제 실패: '+e.message);
  }
}

function renderHistory(){
  makeMonthNav('history-month-nav','history-month',renderHistory);
  const ym_=document.getElementById('history-month').value; if(!ym_)return;
  const mr=[...getMonthRows(ym_)].filter(r=>!r.is_future).sort((a,b)=>b.date.localeCompare(a.date));
  if(!mr.length){ document.getElementById('history-content').innerHTML='<div class="empty">이달 거래 내역이 없습니다</div>'; return; }
  const days=['일','월','화','수','목','금','토'];
  const groups={};
  mr.forEach(r=>{ if(!groups[r.date]) groups[r.date]=[]; groups[r.date].push(r); });
  let html='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const dow=days[new Date(date).getDay()];
    const [y,m,d]=date.split('-');
    const today=new Date().toISOString().slice(0,10);
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    const pre=date===today?'오늘 · ':date===yest?'어제 · ':'';
    html+=`<div class="tx-date-label">${pre}${parseInt(m)}월 ${parseInt(d)}일 (${dow})</div><div class="tx-card">`;
    groups[date].forEach(r=>{
      const isInc=r.category==='수입';
      const dotCls=isInc?'income-t':(r.is_cash?'cash-t':'card-t');
      const amtCls=isInc?'pos':'neg';
      const sign=isInc?'+':'-';
      const typeLabel=isInc?'수입':(r.is_cash?'현금':'카드');
      const ri=r.recurId?'🔁 ':'';
      const delBtn=r.id?`<button class="tx-del-btn" data-id="${r.id}" title="삭제">✕</button>`:'';
      const editBtn=r.id?`<button class="tx-edit-btn" data-edit-id="${r.id}" title="수정">✎</button>`:'';
      html+=`<div class="tx-item">
        <div class="tx-dot ${dotCls}"></div>
        <div class="tx-info"><div class="tx-name">${ri}${r.desc}</div><div class="tx-meta">${typeLabel}</div></div>
        <div class="tx-right">
          <div class="tx-amount ${amtCls}">${sign}${fmt(r.amount)}</div>
          ${r.balance!=null?`<div class="tx-balance">${fmt(r.balance)}</div>`:''}
        </div>
        <div class="tx-actions">${editBtn}${delBtn}</div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('history-content').innerHTML=html;
}


function openTxEditModal(id){
  const r = rows.find(x=>x.id===id);
  if(!r) return;
  editingTxId = id;
  let descVal = r.desc;
  if(r.is_cash && descVal.startsWith('(현금)')) descVal = descVal.slice(4);
  document.getElementById('tx-edit-desc').value = descVal;
  document.getElementById('tx-edit-amount').value = r.amount.toLocaleString('ko-KR');
  document.getElementById('tx-edit-amount').dataset.raw = String(r.amount);
  document.getElementById('tx-edit-modal').classList.remove('hidden');
}
function closeTxEditModal(){ document.getElementById('tx-edit-modal').classList.add('hidden'); editingTxId = null; }

async function saveTxEdit(){
  const btn = document.getElementById('tx-edit-save-btn');
  if(btn && btn.disabled) return;
  const r = rows.find(x=>x.id===editingTxId);
  if(!r){ showToast('수정할 거래를 찾을 수 없습니다'); return; }
  const descInput = document.getElementById('tx-edit-desc').value.trim();
  const amount = getRawAmount('tx-edit-amount');
  if(!descInput){ showToast('내역을 입력해주세요'); return; }
  if(!amount||amount<=0){ showToast('금액을 입력해주세요'); return; }

  const newDesc = r.is_cash ? '(현금)'+descInput : descInput;
  const prevDesc = r.desc, prevAmount = r.amount;
  r.desc = newDesc; r.amount = amount;

  if(btn) btn.disabled = true;
  try{
    try{
      await apiPost('updateRow', {id:r.id, desc:newDesc, amount});
    }catch(err){
      // 반복 거래로 생성된, 아직 시트에 저장된 적 없는 행이면 새로 추가
      if(err.message === 'not found'){
        await apiPost('addRow', {...r});
      } else {
        throw err;
      }
    }
    recalcBalances();
    populateCardSelect(); updateHeaderBalance(); updateInputBalance();
    closeTxEditModal();
    renderHistory();
    showToast('✓ 거래가 수정되었습니다');
  }catch(e){
    r.desc = prevDesc; r.amount = prevAmount;
    showToast('⚠️ 저장 실패: '+e.message);
  } finally {
    if(btn) btn.disabled = false;
  }
}

/* ── 반복규칙 드래그 정렬 ── */
// 드래그 중인 항목은 화면에서 position:fixed로 포인터를 따라다니고,
// 원래 리스트 자리에는 placeholder(빈 칸)를 넣어 순서만 옮긴다.
// (항목을 직접 리스트 안에서 계속 옮기면 매번 레이아웃이 바뀌면서
// 다른 항목 위치와 서로 간섭해 버벅이는 문제가 있었음)
let dragState = null;

document.addEventListener('pointerdown', function(e){
  if(dragState) return; // 이미 드래그 중이면 새 드래그를 또 시작하지 않음
  const handle = e.target.closest('.recur-drag');
  if(!handle) return;
  const item = handle.closest('.recur-item');
  if(!item) return;
  e.preventDefault();

  const rect = item.getBoundingClientRect();
  const placeholder = document.createElement('div');
  placeholder.className = 'recur-placeholder';
  placeholder.style.height = rect.height + 'px';
  item.parentElement.insertBefore(placeholder, item);

  dragState = { item, placeholder, offsetY: e.clientY - rect.top, pointerId: e.pointerId };

  item.classList.add('dragging');
  item.style.position = 'fixed';
  item.style.left = rect.left + 'px';
  item.style.top = rect.top + 'px';
  item.style.width = rect.width + 'px';
  item.style.zIndex = 300;

  // setPointerCapture는 일부 모바일 브라우저(iOS Safari 등)에서 불안정하게
  // 동작하는 경우가 있어, item에 캡처하는 대신 document에 직접 리스너를
  // 붙였다가 드래그가 끝나면 떼는 방식으로 구현 (더 안정적)
  document.addEventListener('pointermove', onRecurDragMove);
  document.addEventListener('pointerup', onRecurDragEnd);
  document.addEventListener('pointercancel', onRecurDragEnd);
});

function onRecurDragMove(e){
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  const { item, placeholder, offsetY } = dragState;
  item.style.top = (e.clientY - offsetY) + 'px';

  const list = placeholder.parentElement;
  const siblings = [...list.querySelectorAll('.recur-item:not(.dragging)')];
  let nextSibling = null;
  for(const el of siblings){
    const box = el.getBoundingClientRect();
    if(e.clientY < box.top + box.height/2){ nextSibling = el; break; }
  }
  list.insertBefore(placeholder, nextSibling);
}

async function onRecurDragEnd(e){
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  const { item, placeholder } = dragState;
  document.removeEventListener('pointermove', onRecurDragMove);
  document.removeEventListener('pointerup', onRecurDragEnd);
  document.removeEventListener('pointercancel', onRecurDragEnd);

  placeholder.parentElement.insertBefore(item, placeholder);
  placeholder.remove();
  item.classList.remove('dragging');
  item.style.position = '';
  item.style.left = '';
  item.style.top = '';
  item.style.width = '';
  item.style.zIndex = '';

  dragState = null;

  const list = document.getElementById('recurring-list');
  const newOrder = [...list.querySelectorAll('.recur-item')].map(el=>el.getAttribute('data-rid'));
  recurRules.sort((a,b)=>newOrder.indexOf(a.id)-newOrder.indexOf(b.id));
  renderRecurring();
  try{
    await apiPost('saveRecur',{rules:recurRules});
  }catch(err){
    showToast('⚠️ 순서 저장 실패: '+err.message);
  }
}

async function toggleRecur(id, enabled){

}

async function deleteRecur(id){

    await apiPost('saveRecur',{rules:recurRules});

async function saveRecurring(){
  const btn=document.getElementById('recur-save-btn');
  if(btn && btn.disabled) return; // 중복 클릭 방지
  const desc=document.getElementById('rm-desc').value.trim();
  const amount=getRawAmount('rm-amount');
  const day=parseInt(document.getElementById('rm-day').value);
  const start=document.getElementById('rm-start').value;
  const end=document.getElementById('rm-end').value;
  const cardDayVal=document.getElementById('rm-card-day').value;
  if(!desc){showToast('내역을 입력해주세요');return;}
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  if(!day||day<1||day>31){showToast('반복 일을 1~31 사이로 입력해주세요');return;}
  if(!start){showToast('시작 월을 입력해주세요');return;}
  const isCash=modalType==='expense'&&modalPay==='cash';
  const isIncome=modalType==='income';
  const cardDay=(!isCash&&!isIncome&&cardDayVal)?parseInt(cardDayVal):null;
  const ruleData={
    category:isIncome?'수입':'지출',
    desc:isCash?'(현금)'+desc:desc,
    amount, day, is_cash:isCash, card_day:cardDay, start, end
  };
  let addedRule=null, editIdx=-1, prevSnapshot=null;
  if(editingRecurId){
    editIdx=recurRules.findIndex(r=>r.id===editingRecurId);
    if(editIdx===-1){ showToast('수정할 항목을 찾을 수 없습니다'); return; }
    prevSnapshot={...recurRules[editIdx]};
    recurRules[editIdx]={...recurRules[editIdx], ...ruleData};
    // 이 규칙에서 생성된 기존 가상 거래는 지우고 새 값으로 다시 생성
    rows=rows.filter(r=>r.recurId!==editingRecurId);
  } else {
    addedRule={ id:'r'+Date.now(), enabled:true, ...ruleData };
    recurRules.push(addedRule);
  }
  if(btn) btn.disabled=true;
  try{
    await apiPost('saveRecur',{rules:recurRules});
    applyRecurring(); recalcBalances();
    populateCardSelect(); updateHeaderBalance(); updateInputBalance();
    const wasEditing=!!editingRecurId;
    closeAddRecurModal(); renderRecurring();
    showToast(wasEditing?'✓ 반복 거래가 수정되었습니다':'✓ 반복 거래가 등록되었습니다');
  }catch(e){
    // 저장 실패 시 로컬에 반영했던 변경을 되돌려 재시도 시 중복 생성을 방지
    if(addedRule){
      recurRules=recurRules.filter(r=>r!==addedRule);
    } else if(editIdx!==-1 && prevSnapshot){
      recurRules[editIdx]=prevSnapshot;
    }
    showToast('⚠️ 저장 실패: '+e.message);
  } finally {
    if(btn) btn.disabled=false;
  }
}

const SEARCH_RESULT_LIMIT=50;
let searchShowCount=SEARCH_RESULT_LIMIT;

function openSearchModal(){
  document.getElementById('search-modal').classList.remove('hidden');
  const input=document.getElementById('search-input');
  input.value='';
  searchShowCount=SEARCH_RESULT_LIMIT;
  document.getElementById('search-results').innerHTML='<div class="empty">검색어를 입력하세요</div>';
  setTimeout(()=>input.focus(),50);
}
function closeSearchModal(){ document.getElementById('search-modal').classList.add('hidden'); }

function loadMoreSearchResults(){
  searchShowCount+=SEARCH_RESULT_LIMIT;
  renderSearchResults(false);
}

function renderSearchResults(resetPage=true){
  if(resetPage) searchShowCount=SEARCH_RESULT_LIMIT;
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const el=document.getElementById('search-results');
  if(!q){ el.innerHTML='<div class="empty">검색어를 입력하세요</div>'; return; }

  const txHitsAll=rows.filter(r=>!r.is_future && r.desc.toLowerCase().includes(q))
                    .sort((a,b)=>b.date.localeCompare(a.date));
  const txHits=txHitsAll.slice(0,searchShowCount);
  const recurHits=recurRules.filter(r=>r.desc.toLowerCase().includes(q));

  if(!txHitsAll.length && !recurHits.length){
    el.innerHTML='<div class="empty">일치하는 내역이 없습니다</div>';
    return;
  }

  let html='';
  if(txHitsAll.length){
    const net=txHitsAll.reduce((s,r)=>s+(r.category==='지출'?-r.amount:r.amount),0);
    html+=`<div class="search-summary">거래 내역 <b>${txHitsAll.length}건</b> · 합계 <b>${net<0?'-':'+'}${fmt(Math.abs(net))}</b></div>`;
    html+=txHits.map(r=>{
      const isInc=r.category==='수입';
      return `<div class="search-hit" data-nav-month="${r.date.slice(0,7)}" data-nav-id="${r.id}">
        <div class="search-hit-info">
          <div class="search-hit-name">${r.recurId?'🔁 ':''}${r.desc}</div>
          <div class="search-hit-meta">${r.date} · ${r.category}${r.is_cash?' · 현금':''}</div>
        </div>
        <div class="search-hit-amount" style="color:${isInc?'#0d8a56':'#c03030'}">${isInc?'+':'-'}${fmt(r.amount)}</div>
      </div>`;
    }).join('');
    if(txHitsAll.length>txHits.length){
      const remain=txHitsAll.length-txHits.length;
      html+=`<button class="search-more-btn" onclick="loadMoreSearchResults()">+ ${Math.min(SEARCH_RESULT_LIMIT,remain)}건 더 보기 (${txHits.length}/${txHitsAll.length})</button>`;
    }
  }
  if(recurHits.length){
    html+=`<div class="search-summary">반복 설정 <b>${recurHits.length}건</b></div>`;
    html+=recurHits.map(r=>{
      const isInc=r.category==='수입';
      return `<div class="search-hit" data-nav-recur="1">
        <div class="search-hit-info">
          <div class="search-hit-name">${r.desc}</div>
          <div class="search-hit-meta">매월 ${r.day}일 · ${r.enabled?'활성':'중지'}</div>
        </div>
        <div class="search-hit-amount" style="color:${isInc?'#0d8a56':'#c03030'}">${isInc?'+':'-'}${fmt(r.amount)}</div>
      </div>`;
    }).join('');
  }
  el.innerHTML=html;
}

function highlightRow(id){

/* ── 월 네비게이터 ── */
function makeMonthNav(containerId, selectId, onChangeFunc){
  const el = document.getElementById(containerId);
  if(!el) return;
  const months = getMonths();
  const selVal = document.getElementById(selectId)?.value || months[months.length-1] || '';
  const [y,m] = selVal ? selVal.split('-') : ['',''];
  el.innerHTML = `<div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonthNav('${selectId}',-1,${onChangeFunc.name})">‹</button>
    <select id="${selectId}" onchange="${onChangeFunc.name}()" style="font-size:15px;font-weight:700;color:#1a1a18;background:none;border:none;outline:none;cursor:pointer;text-align:center">
      ${months.map(mo=>{ const[y2,m2]=mo.split('-'); return `<option value="${mo}" ${mo===selVal?'selected':''}>${y2}년 ${parseInt(m2)}월</option>`; }).join('')}
    </select>
    <button class="month-nav-btn" onclick="changeMonthNav('${selectId}',1,${onChangeFunc.name})">›</button>
  </div>`;
}

function changeMonthNav(selectId, dir, cb){
  const el = document.getElementById(selectId);
  if(!el) return;
  const opts = [...el.options];
  const idx = opts.findIndex(o=>o.value===el.value);
  const newIdx = Math.max(0, Math.min(opts.length-1, idx+dir));
  el.value = opts[newIdx].value;
  cb();
}

/* ── 금액 입력 콤마 포맷 ── */
function formatAmountInput(el){
  const raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
  el.dataset.raw = raw;
}
function getRawAmount(id){
  const el = document.getElementById(id);
  return parseInt((el.dataset.raw || el.value.replace(/[^0-9]/g,''))) || 0;
}

document.addEventListener('DOMContentLoaded', function(){
  ['input-amount','rm-amount','tx-edit-amount'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', function(){
      const pos = this.selectionStart;
      const prevLen = this.value.length;
      formatAmountInput(this);
      // 커서 위치 보정
      const diff = this.value.length - prevLen;
      this.setSelectionRange(pos+diff, pos+diff);
    });
    el.addEventListener('keydown', function(e){
      // 숫자, 백스페이스, 방향키, 탭, Delete만 허용
      if(!/[0-9]/.test(e.key) && !['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'].includes(e.key) && !e.metaKey && !e.ctrlKey){
        e.preventDefault();
      }
    });
  });
});
